<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>キャンパスハート — 4つの春、ひとつの答え</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- タイトル画面 -->
    <section id="title" class="screen"></section>

    <!-- キャラ紹介 -->
    <section id="gallery" class="screen"></section>

    <!-- 名前入力 / プロローグ -->
    <section id="prologue" class="screen"></section>

    <!-- 本編シーン（立ち絵・テキスト・選択肢） -->
    <section id="scene" class="screen">
      <div class="scene-box">
        <div class="speaker" id="speaker"></div>
        <div class="line" id="line"></div>
        <div class="choices" id="choices"></div>
        <div class="next-hint" id="next-hint">▼ クリックで進む</div>
      </div>
    </section>

    <!-- ホームハブ（行動選択） -->
    <section id="hub" class="screen"></section>

    <!-- エンディング -->
    <section id="ending" class="screen"></section>
  </div>
  <script src="js/engine.js"></script>
  <!-- ヒロイン別シナリオ -->
  <script src="js/scenarios/misaki.js"></script>
  <script src="js/scenarios/shiori.js"></script>
  <script src="js/scenarios/reina.js"></script>
  <script src="js/scenarios/hikari.js"></script>
</body>
</html>
